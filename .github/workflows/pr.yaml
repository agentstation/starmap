name: Pull Request

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verification:
    name: Verification Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up minimum supported Go toolchain
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.12"
          # This first setup is the sole cache owner for the job.
          cache: true

      - name: Test minimum supported Go version
        env:
          GOTOOLCHAIN: local
        run: go test ./...

      - name: Set up release Go toolchain
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          # Reuse the module/build cache populated by the minimum-version lane
          # without extracting the same archive over existing module files.
          cache: false

      - name: Install pinned verification tools
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0
          go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@v1.1.0

      - name: Run verification gate
        run: make verify

  security-reliability:
    name: Security & Reliability
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up release Go toolchain
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true

      - name: Install pinned vulnerability scanner
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0

      - name: Scan reachable Go vulnerabilities
        run: govulncheck ./...

      - name: Run bounded fuzz smoke
        run: |
          go test ./internal/sources/modelsdev -run '^$' -fuzz '^FuzzParseAPIDataNoPanic$' -fuzztime=10s
          go test ./pkg/catalogs -run '^$' -fuzz '^FuzzSourceExtensionNoPanic$' -fuzztime=10s
          go test ./pkg/reconciler -run '^$' -fuzz '^FuzzReconciliationNoPanic$' -fuzztime=10s

      - name: Run migration and persistence fault fixtures
        run: |
          go test ./pkg/catalogs ./pkg/catalogstore -race -run 'Migration|Rollback|Fault|Corrupt|ReopensCurrent' -count=1
