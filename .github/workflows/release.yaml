name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  attestations: write
  contents: write
  discussions: write
  id-token: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up release Go toolchain
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true

      - name: Require release tag from main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Install pinned release tools
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0
          go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@v1.1.0
          go install github.com/goreleaser/goreleaser/v2@v2.17.0

      - name: Check embedded catalog budgets
        run: make embedded-catalog-budget-check

      - name: Run release verification
        run: |
          make verify
          make release-check

  release:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up release Go toolchain
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true

      - name: Install gomarkdoc
        run: go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@v1.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.46.0

      - name: Import release signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.ORG_GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --reload gpg-agent

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean --parallelism 2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.ORG_GPG_PASSPHRASE }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}

      - name: Attest released archives and SBOMs
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/checksums.txt

      - name: Verify downloaded release assets and publisher identity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DOWNLOAD_DIRECTORY=${RUNNER_TEMP}/release-download
          mkdir -p "$DOWNLOAD_DIRECTORY"
          gh release download "$GITHUB_REF_NAME" --dir "$DOWNLOAD_DIRECTORY"
          cmp dist/checksums.txt "$DOWNLOAD_DIRECTORY/checksums.txt"
          cmp dist/checksums.txt.sig "$DOWNLOAD_DIRECTORY/checksums.txt.sig"
          (
            cd "$DOWNLOAD_DIRECTORY"
            gpg --batch --verify checksums.txt.sig checksums.txt
            sha256sum --check checksums.txt
          )
          while read -r _ asset; do
            gh attestation verify \
              "$DOWNLOAD_DIRECTORY/$asset" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yaml" \
              --deny-self-hosted-runners
          done < "$DOWNLOAD_DIRECTORY/checksums.txt"

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dist
          path: dist/

  verify-homebrew:
    needs: release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Install from AgentStation tap
        run: brew install agentstation/tap/starmap

      - name: Verify installed release
        run: |
          EXPECTED=${GITHUB_REF_NAME#v}
          test "$(starmap version | awk '{print $2}')" = "$EXPECTED"
