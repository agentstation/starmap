- id: openai
  name: OpenAI
  headquarters: San Francisco, CA, USA
  icon_url: https://cdn.openai.com/API/logo-openai.svg
  api_key:
    name: OPENAI_API_KEY
    pattern: .*
    header: Authorization
    scheme: Bearer
    query_param: ""
