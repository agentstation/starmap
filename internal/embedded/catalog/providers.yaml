# Fireworks AI
- id: fireworks-ai
  aliases:
  - fireworks
  name: Fireworks AI
  headquarters: Redwood City, CA, USA
  icon_url: https://fireworks.ai/favicon.ico
  api_key:
    name: FIREWORKS_API_KEY
    pattern: .*
    header: Authorization
    scheme: Bearer
    query_param: ""
  env_vars:
  - name: FIREWORKS_API_KEY
    required: false
  catalog:
    docs: https://docs.fireworks.ai/tools-sdks/openai-compatibility
    endpoint:
      type: openai
      url: https://api.fireworks.ai/inference/v1/models
      auth_required: true
      feature_rules:
      - field: id
        contains:
        - deepseek-r1
        - qwen3
        feature: reasoning
        value: true
      author_mapping:
        field: id
        normalized:
          accounts/fireworks/models/deepseek*: deepseek
          accounts/fireworks/models/gpt-oss*: openai
          accounts/fireworks/models/kimi*: moonshot-ai
          accounts/fireworks/models/llama*: meta
          accounts/fireworks/models/mistral*: mistral
          accounts/fireworks/models/mixtral*: mistral
          accounts/fireworks/models/qwen*: alibaba
          accounts/fireworks/models/yi-*: 01.ai
          accounts/fireworks/routers/deepseek*: deepseek
          accounts/fireworks/routers/gpt-oss*: openai
          accounts/fireworks/routers/kimi*: moonshot-ai
          accounts/fireworks/routers/llama*: meta
          accounts/fireworks/routers/mistral*: mistral
          accounts/fireworks/routers/mixtral*: mistral
          accounts/fireworks/routers/qwen*: alibaba
          accounts/fireworks/routers/yi-*: 01.ai
  status_page_url: https://status.fireworks.ai
  chat_completions:
    url: https://api.fireworks.ai/inference/v1/chat/completions
  extensions:
    models.dev:
      fields:
        api: https://api.fireworks.ai/inference/v1/
        npm: "@ai-sdk/openai-compatible"

