# DeepInfra
- id: deepinfra
  name: DeepInfra
  headquarters: San Francisco, CA, USA
  icon_url: https://deepinfra.com/favicon.ico
  api_key:
    name: DEEPINFRA_TOKEN
    pattern: .*
    header: Authorization
    scheme: Bearer
    query_param: ""
  env_vars:
  - name: DEEPINFRA_API_KEY
    required: false
  catalog:
    docs: https://docs.deepinfra.com/chat/overview
    endpoint:
      type: openai
      url: https://api.deepinfra.com/v1/openai/models
      auth_required: false
      field_mappings:
      - from: metadata.description
        to: description
      - from: metadata.context_length
        to: limits.context_window
      - from: metadata.tags
        to: metadata.tags
      feature_rules:
      - field: metadata.tags
        contains:
        - reasoning
        feature: reasoning
        value: true
      author_mapping:
        field: id
        normalized:
          01-ai/*: 01.ai
          BAAI/*: baai
          ByteDance/*: bytedance
          MiniMaxAI/*: minimax
          NousResearch/*: nousresearch
          Qwen/*: alibaba
          cognitivecomputations/*: cognitivecomputations
          deepseek-ai/*: deepseek
          google/*: google
          meta-llama/*: meta
          microsoft/*: microsoft
          mistralai/*: mistral
          moonshotai/*: moonshot-ai
          nvidia/*: nvidia
          openai/*: openai
          zai-org/*: zhipu-ai
  chat_completions:
    url: https://api.deepinfra.com/v1/openai/chat/completions
  extensions:
    models.dev:
      fields:
        npm: "@ai-sdk/deepinfra"

