      observation_scope: global_public
      auth: api_key
      topology: paginated
      endpoint:
        type: anthropic
        url: https://api.anthropic.com/v1/models
        path: "/models"
      offering:
        access:
          channel: server_to_server
          routability: routable
          apis:
          - messages
        endpoint:
          type: anthropic
        deployment:
          type: serverless
