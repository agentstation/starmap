  headquarters: Mountain View, CA, USA
  icon_url: https://www.gstatic.com/marketing-cms/assets/images/29/8c/e1f2c0994e87b8d7edf2886f9c02/google-cloud.webp
  environment_advisories:
  - name: GOOGLE_APPLICATION_CREDENTIALS
    description: Path to service account JSON file (optional - uses Application Default
      Credentials)
  catalog:
    sources:
    - id: regional-models
      docs: https://cloud.google.com/vertex-ai/generative-ai/docs/model-reference/inference
      observation_scope: regional_public
      auth: cloud_chain
      scopes:
        project:
          source: env
          name:
          - GOOGLE_CLOUD_PROJECT
          - GOOGLE_VERTEX_PROJECT
          fallback: cloud_profile
          role: required_input
          description: GCP project ID (optional - falls back to gcloud config)
        location:
          source: env
          name:
          - GOOGLE_CLOUD_LOCATION
          - GOOGLE_CLOUD_REGION
          - GOOGLE_VERTEX_LOCATION
          fallback: cloud_profile
          role: required_input
          description: GCP location/region (optional - falls back to gcloud config
            or us-central1)
      endpoint:
        type: google-cloud
        url: https://us-central1-aiplatform.googleapis.com/v1/projects/{project}/locations/{location}/models
      authors:
      - ai21
      - anthropic
      - deepseek-ai
      - google
      - meta
      - mistralai
      - openai
      - qwen
  invocation:
    routes:
    - id: chat-completions
      api: chat_completions
      auth: cloud_chain
      endpoint: https://us-central1-aiplatform.googleapis.com/v1/projects
  status_page_url: https://status.cloud.google.com
  privacy_policy:
    privacy_policy_url: https://cloud.google.com/privacy
    terms_of_service_url: https://cloud.google.com/terms
    retains_data: true
    trains_on_data: false
  retention_policy:
    type: fixed
    duration: 48h0m0s
    details: Data retention period not specified in privacy policy; estimated 48 hours
      based on typical Google Cloud practices; enterprise customers may configure
      longer periods
  governance_policy:
    moderation_required: false
    moderated: true
    moderator: google-vertex
  extensions:
    models.dev:
      fields:
        npm: "@ai-sdk/google-vertex"
- id: groq
  name: Groq
  headquarters: Mountain View, CA, USA
  icon_url: https://groq.com/favicon.ico
  credentials:
    api_key:
      env: GROQ_API_KEY
  catalog:
    sources:
    - id: models
      docs: https://console.groq.com/docs/models
      observation_scope: global_public
      auth: api_key
      endpoint:
        type: openai
        url: https://api.groq.com/openai/v1/models
        field_mappings:
        - from: context_window
          to: limits.context_window
        - from: max_completion_tokens
          to: limits.output_tokens
        - from: active
          to: lifecycle
          values:
            'false': unknown
            'true': active
        author_mapping:
          field: owned_by
          normalized:
            Alibaba Cloud: alibaba
            DeepSeek: deepseek
            Google: google
            Meta: meta
            Moonshot AI: moonshot-ai
            OpenAI: openai
            PlayAI: playai
      authors:
      - alibaba
      - deepseek
      - google
      - groq
      - huggingfaceh4
      - meta
      - moonshot-ai
      - openai
      - playai
      - sdaia
  invocation:
    routes:
    - id: chat-completions
      api: chat_completions
      auth: api_key
      endpoint: https://api.groq.com/openai/v1/chat/completions
      health_api_url: https://groqstatus.com/api/v2/summary.json
      health_components:
      - id: 01K053E2FAKWKEYHXEV7WAHJBM
        name: API
  status_page_url: https://status.groq.com
  privacy_policy:
    privacy_policy_url: https://groq.com/privacy-policy/
    terms_of_service_url: https://groq.com/terms-of-use/
    retains_data: false
    trains_on_data: false
  retention_policy:
    type: none
    duration: 0s
    details: Input prompts and context are not retained; data is processed for immediate
      response generation and then discarded
  governance_policy:
    moderation_required: false
    moderated: true
    moderator: groq
  extensions:
    models.dev:
      fields:
        npm: "@ai-sdk/groq"
