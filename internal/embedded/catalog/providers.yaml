# Alibaba Cloud Model Studio
- id: alibaba
  aliases:
  - alibaba-cloud
  - alibaba-model-studio
  - dashscope
  - model-studio
  - qwen
  name: Alibaba Cloud Model Studio
  headquarters: Hangzhou, China
  icon_url: https://www.alibabacloud.com/favicon.ico
  api_key:
    name: DASHSCOPE_API_KEY
    pattern: .*
    header: Authorization
    scheme: Bearer
    query_param: ""
  env_vars:
  - name: DASHSCOPE_API_KEY
    required: false
  catalog:
    docs: https://www.alibabacloud.com/help/en/model-studio/qwen-api-via-openai-chat-completions
    endpoint:
      type: openai
      url: https://dashscope-us.aliyuncs.com/compatible-mode/v1/models
      base_url_env_var: ALIBABA_MODEL_STUDIO_BASE_URL
      path: /models
      auth_required: true
      author_mapping:
        field: id
        normalized:
          deepseek*: deepseek
          glm*: zhipu-ai
          kimi*: moonshot-ai
          minimax*: minimax
          qvq*: alibaba
          qwen*: alibaba
          qwq*: alibaba
          wan*: alibaba
  chat_completions:
    url: https://dashscope-us.aliyuncs.com/compatible-mode/v1/chat/completions
  extensions:
    models.dev:
      fields:
        api: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
        npm: "@ai-sdk/openai-compatible"

# Anthropic
- id: anthropic
  name: Anthropic
  headquarters: San Francisco, CA, USA
  icon_url: https://www.anthropic.com/favicon.ico
  api_key:
    name: ANTHROPIC_API_KEY
    pattern: .*
    header: x-api-key
    scheme: ""
    query_param: ""
  env_vars:
  - name: ANTHROPIC_API_KEY
    required: false
  catalog:
    docs: https://docs.anthropic.com/en/docs/about-claude/models/overview
    endpoint:
      type: anthropic
      url: https://api.anthropic.com/v1/models
      auth_required: true
  status_page_url: https://status.anthropic.com
  chat_completions:
    url: https://api.anthropic.com/v1/messages
    health_api_url: https://status.anthropic.com/api/v2/summary.json
    health_components:
    - id: k8w3r06qmzrp
      name: api.anthropic.com
  privacy_policy:
    privacy_policy_url: https://www.anthropic.com/privacy
    terms_of_service_url: https://www.anthropic.com/terms
    retains_data: true
    trains_on_data: false
  retention_policy:
    type: fixed
    duration: 720h0m0s #30 days
    details: API inputs and outputs are automatically deleted within 30 days unless required for policy enforcement or legal compliance
  governance_policy:
    moderation_required: false
    moderated: true
    moderator: anthropic
  extensions:
    models.dev:
      fields:
        npm: "@ai-sdk/anthropic"

# Baseten Model APIs
- id: baseten
  name: Baseten Model APIs
  headquarters: San Francisco, CA, USA
  icon_url: https://www.baseten.co/favicon.ico
  api_key:
    name: BASETEN_API_KEY
    pattern: .*
    header: Authorization
    scheme: Bearer
    query_param: ""
  env_vars:
  - name: BASETEN_API_KEY
    required: false
  - name: BASETEN_BASE_URL
    required: false
  catalog:
    docs: https://docs.baseten.co/inference/model-apis/overview
    endpoint:
      type: openai
      url: https://inference.baseten.co/v1/models
      base_url_env_var: BASETEN_BASE_URL
      path: /models
      auth_required: true
      author_mapping:
        field: id
        normalized:
          deepseek-ai/*: deepseek
          moonshotai/*: moonshot-ai
          nvidia/*: nvidia
          openai/*: openai
          zai-org/*: zhipu-ai
    offering:
      access:
        channel: server_to_server
        routability: routable
        apis:
        - chat_completions
        - messages
      endpoint:
        type: openai
      deployment:
        type: serverless
        tier: model-api
    authors:
    - deepseek
    - moonshot-ai
    - nvidia
    - openai
    - zhipu-ai
  chat_completions:
    url: https://inference.baseten.co/v1/chat/completions

# Cerebras
- id: cerebras
  name: Cerebras
  headquarters: Sunnyvale, CA, USA
  icon_url: https://cerebras.ai/favicon.ico
  api_key:
    name: CEREBRAS_API_KEY
    pattern: .*
    header: Authorization
    scheme: Bearer
    query_param: ""
  env_vars:
  - name: CEREBRAS_API_KEY
    required: false
  catalog:
    docs: https://inference-docs.cerebras.ai/models/overview
    endpoint:
      type: openai
      url: https://api.cerebras.ai/v1/models
      auth_required: true
      feature_rules:
      - field: id
        contains:
        - llama
        feature: tools
        value: true
      - field: id
        contains:
        - r1
        feature: reasoning
        value: true
      author_mapping:
        field: owned_by
        normalized:
          Alibaba: alibaba
          DeepSeek: deepseek
          Meta: meta
          OpenAI: openai
    authors:
    - alibaba
    - meta
    - openai
  status_page_url: https://status.cerebras.ai/
  chat_completions:
    url: https://api.cerebras.ai/v1/chat/completions
    health_api_url: https://status.cerebras.ai/api/v2/summary.json
    health_components:
    - id: 7xvps6c9lqwc
      name: Llama3.1-8B
    - id: s2bwxqnnvxrm
      name: Llama-3.3-70B
    - id: j1zb29zpldhn
      name: DeepSeek-R1-Distill-Llama-70B
    - id: wnty4dn86r6z
      name: Llama-4-Scout
    - id: lg464gw325m6
      name: Llama-4-Maverick
    - id: fb0rz0v52prv
      name: Qwen-3-32B
    - id: bhqw2gr7r710
      name: Qwen-3-235B-Instruct-2507
    - id: 6fy6xk2ttdk5
      name: Qwen-3-235B-Thinking-2507
    - id: 8xslm6vgnmtb
      name: Qwen-3-480B-Coder
    - id: hgfykfsb36gn
      name: GPT-OSS-120B
  privacy_policy:
    privacy_policy_url: https://www.cerebras.ai/privacy-policy
    terms_of_service_url: https://www.cerebras.ai/terms-of-service
    retains_data: false
    trains_on_data: false
  retention_policy:
    type: none
    duration: 0s #immediate
    details: API inputs and outputs are not retained for training, inference and chatbot services. Data is processed for immediate response generation and then discarded.
  governance_policy:
    moderation_required: false
    moderated: true
    moderator: cerebras
  extensions:
    models.dev:
      fields:
        npm: "@ai-sdk/cerebras"

