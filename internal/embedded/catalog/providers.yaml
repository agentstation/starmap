- id: amazon-bedrock
  name: Amazon Bedrock
  headquarters: Seattle, WA, USA
  environment_advisories:
  - name: AWS_PROFILE
    description: Optional AWS SDK profile selected by the official default credential chain
  catalog:
    sources:
    - id: account-regional-inventory
      docs: https://docs.aws.amazon.com/bedrock/latest/APIReference/API_Operations_Amazon_Bedrock.html
      observation_scope: credential_scoped
      auth: cloud_chain
      optional: true
      topology: regional_sweep
      scopes:
        regions:
          source: governed_sweep
          values:
          - us-east-1
          - us-east-2
          - us-west-2
          - eu-central-1
          - eu-west-1
          - eu-west-2
          - eu-west-3
          - ap-northeast-1
          - ap-northeast-3
          - ap-south-1
          - ap-southeast-1
          - ap-southeast-2
          role: iteration
      endpoint:
        type: amazon-bedrock
        url: https://bedrock.us-east-1.amazonaws.com
- id: microsoft-foundry
  name: Microsoft Foundry
  headquarters: Redmond, WA, USA
  environment_advisories:
  - name: AZURE_TENANT_ID
    description: Optional Microsoft Entra tenant used by the official default credential chain
  catalog:
    sources:
    - id: account-inventory
      docs: https://learn.microsoft.com/azure/ai-foundry/
      observation_scope: credential_scoped
      auth: cloud_chain
      optional: true
      topology: paginated
      scopes:
        subscription:
          source: env
          name: AZURE_SUBSCRIPTION_ID
          role: required_input
        resource_group:
          source: env
          name: AZURE_RESOURCE_GROUP
          role: required_input
        account:
          source: env
          name: AZURE_FOUNDRY_ACCOUNT
          role: required_input
        location:
          source: env
          name: AZURE_FOUNDRY_LOCATION
          role: required_input
        endpoint:
          source: env
          name: AZURE_FOUNDRY_ENDPOINT
          fallback: cloud_profile
          role: required_input
      options:
        realm:
          source: static
          value: azure-public
      endpoint:
        type: azure-openai
        url: https://management.azure.com
- id: oracle-oci-generative-ai
