    required: false
  catalog:
    docs: https://platform.openai.com/docs/models
    endpoint:
      type: openai
      url: https://api.openai.com/v1/models
      auth_required: true
      author_mapping:
        field: owned_by
        normalized:
          system: openai
  status_page_url: https://status.openai.com
