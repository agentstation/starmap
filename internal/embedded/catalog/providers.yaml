    trains_on_data: false
  retention_policy:
    type: fixed
    duration: 720h0m0s
    details: API inputs and outputs are automatically deleted within 30 days unless
      required for policy enforcement or legal compliance
  governance_policy:
    moderation_required: false
    moderated: true
    moderator: anthropic
  extensions:
    models.dev:
      fields:
        npm: "@ai-sdk/anthropic"
