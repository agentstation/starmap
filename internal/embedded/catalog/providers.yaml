- id: cerebras
  name: Cerebras
  headquarters: Sunnyvale, CA, USA
  icon_url: https://cerebras.ai/favicon.ico
  credentials:
    api_key:
      env: CEREBRAS_API_KEY
  catalog:
    sources:
    - id: public-models
      docs: https://inference-docs.cerebras.ai/api-reference/models/public-models
      observation_scope: global_public
      auth: none
      endpoint:
        type: openai
        url: https://api.cerebras.ai/public/v1/models?format=openrouter
        field_mappings:
        - from: name
          to: name
        - from: description
          to: description
        - from: context_length
          to: limits.context_window
        - from: max_output_length
          to: limits.output_tokens
        - from: input_modalities
          to: features.modalities.input
        - from: output_modalities
          to: features.modalities.output
        - from: deprecated
          to: lifecycle
          values:
            'false': active
            'true': deprecated
        - from: pricing.prompt
          to: pricing.tokens.input
          unit: per_token
          currency: USD
        - from: pricing.completion
          to: pricing.tokens.output
          unit: per_token
          currency: USD
        - from: pricing.input_cache_read
          to: pricing.tokens.cache_read
          unit: per_token
          currency: USD
        feature_rules:
        - field: supported_features
          contains:
          - tools
          feature: tools
          value: true
        - field: supported_features
          contains:
          - reasoning
          feature: reasoning
          value: true
        - field: supported_features
          contains:
          - structured_outputs
          feature: structured_outputs
          value: true
        - field: supported_features
          contains:
          - json_mode
          feature: format_response
          value: true
        author_mapping:
          field: owned_by
          normalized:
            Alibaba: alibaba
            DeepSeek: deepseek
            Meta: meta
            OpenAI: openai
      offering:
        access:
          channel: server_to_server
          routability: routable
          apis:
          - chat_completions
        endpoint:
          type: openai
          base_url: https://api.cerebras.ai/v1
        deployment:
          type: serverless
      authors:
      - alibaba
      - meta
      - openai
  invocation:
    routes:
    - id: chat-completions
      api: chat_completions
      auth: api_key
      endpoint: https://api.cerebras.ai/v1/chat/completions
      health_api_url: https://status.cerebras.ai/api/v2/summary.json
      health_components:
      - id: 7xvps6c9lqwc
        name: Llama3.1-8B
      - id: s2bwxqnnvxrm
        name: Llama-3.3-70B
      - id: j1zb29zpldhn
        name: DeepSeek-R1-Distill-Llama-70B
      - id: wnty4dn86r6z
        name: Llama-4-Scout
      - id: lg464gw325m6
        name: Llama-4-Maverick
      - id: fb0rz0v52prv
        name: Qwen-3-32B
      - id: bhqw2gr7r710
        name: Qwen-3-235B-Instruct-2507
      - id: 6fy6xk2ttdk5
        name: Qwen-3-235B-Thinking-2507
      - id: 8xslm6vgnmtb
        name: Qwen-3-480B-Coder
      - id: hgfykfsb36gn
        name: GPT-OSS-120B
  status_page_url: https://status.cerebras.ai/
  privacy_policy:
    privacy_policy_url: https://www.cerebras.ai/privacy-policy
    terms_of_service_url: https://www.cerebras.ai/terms-of-service
    retains_data: false
    trains_on_data: false
  retention_policy:
    type: none
    duration: 0s
    details: API inputs and outputs are not retained for training, inference and chatbot
      services. Data is processed for immediate response generation and then discarded.
  governance_policy:
    moderation_required: false
    moderated: true
    moderator: cerebras
  extensions:
    models.dev:
      fields:
        npm: "@ai-sdk/cerebras"
