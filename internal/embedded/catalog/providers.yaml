- id: anthropic
  name: Anthropic
  headquarters: San Francisco, CA, USA
  icon_url: https://www.anthropic.com/favicon.ico
  credentials:
    api_key:
      env: ANTHROPIC_API_KEY
      transport:
        header: x-api-key
        scheme: direct
