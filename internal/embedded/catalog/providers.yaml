- id: novita
  aliases:
  - novita-ai
  name: Novita AI LLM API
  headquarters: Singapore
  icon_url: https://novita.ai/favicon.ico
  credentials:
    api_key:
      env: NOVITA_API_KEY
  catalog:
    sources:
    - id: models
      docs: https://novita.ai/docs/api-reference/model-apis-llm-list-models
      observation_scope: global_public
      auth: api_key
      endpoint:
        type: openai
        url: https://api.novita.ai/openai/v1/models
        path: "/models"
        field_mappings:
        - from: title
          to: name
        - from: description
          to: description
        - from: context_size
          to: limits.context_window
        - from: input_token_price_per_m
          to: pricing.tokens.input
          unit: milli_currency_per_million_tokens
          currency: USD
        - from: output_token_price_per_m
          to: pricing.tokens.output
          unit: milli_currency_per_million_tokens
          currency: USD
        - from: input_token_price_per_m
          to: pricing.tokens.input
          unit: milli_currency_per_million_tokens
          currency: USD
          mode: batch
          scale: 0.5
        - from: output_token_price_per_m
          to: pricing.tokens.output
          unit: milli_currency_per_million_tokens
          currency: USD
          mode: batch
          scale: 0.5
        - from: input_token_price_per_m
          to: extensions.novita.input_token_price_per_m_raw
        - from: output_token_price_per_m
          to: extensions.novita.output_token_price_per_m_raw
        author_mapping:
          field: id
          normalized:
            BAAI/*: baai
            Qwen/*: alibaba
            XiaomiMiMo/*: xiaomi
            deepseek-ai/*: deepseek
            google/*: google
            meta-llama/*: meta
            microsoft/*: microsoft
            mistralai/*: mistral
            moonshotai/*: moonshot-ai
            openai/*: openai
            zai-org/*: zhipu-ai
        base_url_env: NOVITA_BASE_URL
      offering:
        access:
          channel: server_to_server
          routability: routable
          apis:
          - chat_completions
          - completions
        endpoint:
          type: openai
        deployment:
          type: serverless
          tier: pay-per-token
      authors:
      - alibaba
      - baai
      - deepseek
      - google
      - meta
      - microsoft
      - mistral
      - moonshot-ai
      - openai
      - xiaomi
      - zhipu-ai
  invocation:
    routes:
    - id: chat-completions
      api: chat_completions
      auth: api_key
      endpoint: https://api.novita.ai/openai/v1/chat/completions
