# o4-mini - Fast o-series model for compact reasoning, coding, and tool ...
id: o4-mini
name: o4-mini
authors:
- id: openai
  name: OpenAI
description: Fast o-series model for compact reasoning, coding, and tool use

# Model metadata
metadata:
  release_date: 2025-04-16
  open_weights: false
  knowledge_cutoff: 2024-05-01
lineage:
  family: o-mini

# Model features
features:
  modalities:
    input:
    - text
    - image
    output:
    - text

  # Core capabilities
  tool_calls: false
  tools: false
  tool_choice: false
  web_search: false
  attachments: false

  # Reasoning & Verbosity
  reasoning: false
  reasoning_effort: false
  reasoning_tokens: false
  include_reasoning: false
  verbosity: false

  # Generation control support flags
  temperature: true
  top_p: true
  top_k: false
  top_a: false
  min_p: false
  typical_p: false
  tfs: false
  max_tokens: true
  max_output_tokens: false
  stop: true
  stop_token_ids: false
  frequency_penalty: false
  presence_penalty: false
  repetition_penalty: false
  no_repeat_ngram_size: false
  length_penalty: false
  logit_bias: false
  bad_words: false
  allowed_tokens: false
  seed: false
  logprobs: false
  top_logprobs: false
  echo: false
  "n": false
  best_of: false
  mirostat: false
  mirostat_tau: false
  mirostat_eta: false
  contrastive_search_penalty_alpha: false
  num_beams: false
  early_stopping: false
  diversity_penalty: false

  # Response delivery
  format_response: false
  structured_outputs: false
  streaming: true
reasoning:
  levels:
  - low
  - medium
  - high
  default: null

# Model pricing
pricing:
  tokens:
    cache_read:
      per_1m: 0.275
    input:
      per_1m: 1.1
    output:
      per_1m: 4.4
  currency: USD

# Model limits
limits:
  context_window: 200000
  input_tokens: 0
  output_tokens: 100000

