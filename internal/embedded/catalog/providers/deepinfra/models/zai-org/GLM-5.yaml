description: Flagship GLM model for hybrid reasoning, coding, and agentic engineering

# Model metadata
metadata:
  release_date: 2026-02-12
  open_weights: true
  knowledge_cutoff: 2025-12-01
  tags:
  - chat
  - prompt_cache
  - reasoning
lineage:
