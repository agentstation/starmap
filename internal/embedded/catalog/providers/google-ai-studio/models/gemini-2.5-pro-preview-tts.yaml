# gemini-2.5-pro-preview-tts - Gemini 2.5 Pro Preview TTS
id: gemini-2.5-pro-preview-tts
name: Gemini 2.5 Pro Preview TTS
authors:
- id: google
  name: Google
description: Gemini 2.5 Pro Preview TTS

# Model metadata
metadata:
  release_date: 2025-05-01
  open_weights: false
  knowledge_cutoff: 2025-01-01
lineage:
  family: gemini-flash

# Model features
features:
  modalities:
    input:
    - text
    - image
    output:
    - text
    - audio

  # Core capabilities
  tool_calls: true
  tools: true
  tool_choice: true
  web_search: false
  attachments: false

  # Reasoning & Verbosity
  reasoning: false
  reasoning_effort: false
  reasoning_tokens: false
  include_reasoning: false
  verbosity: false

  # Generation control support flags
  temperature: true
  top_p: true
  top_k: true
  top_a: false
  min_p: false
  typical_p: false
  tfs: false
  max_tokens: true
  max_output_tokens: false
  stop: false
  stop_token_ids: false
  frequency_penalty: false
  presence_penalty: false
  repetition_penalty: false
  no_repeat_ngram_size: false
  length_penalty: false
  logit_bias: false
  bad_words: false
  allowed_tokens: false
  seed: false
  logprobs: false
  top_logprobs: false
  echo: false
  "n": false
  best_of: false
  mirostat: false
  mirostat_tau: false
  mirostat_eta: false
  contrastive_search_penalty_alpha: false
  num_beams: false
  early_stopping: false
  diversity_penalty: false

  # Response delivery
  format_response: false
  structured_outputs: false
  streaming: false
generation:
  temperature:
    min: 0.0
    max: 2.0
    default: 1.0
  top_p:
    min: 0.0
    max: 0.0
    default: 0.95
  top_k:
    min: 0
    max: 0
    default: 64

# Model pricing
pricing:
  tokens:
    input:
      per_1m: 1.0
    output:
      per_1m: 20.0
  currency: USD

# Model limits
limits:
  context_window: 8192
  input_tokens: 8192
  output_tokens: 16384
extensions:
  google-ai-studio:
    fields:
      supported_actions:
      - countTokens
      - generateContent
      - batchGenerateContent
      supported_generation_methods:
      - countTokens
      - generateContent
      - batchGenerateContent
      version: gemini-2.5-pro-preview-tts-2025-05-19

