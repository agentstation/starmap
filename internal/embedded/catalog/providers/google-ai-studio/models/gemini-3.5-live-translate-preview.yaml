# gemini-3.5-live-translate-preview - Gemini 3.5 Live Translate Preview
id: gemini-3.5-live-translate-preview
name: Gemini 3.5 Live Translate Preview
authors:
- id: google
  name: Google
description: Gemini 3.5 Live Translate Preview

# Model features
features:
  modalities:
    input:
    - text
    - image
    output:
    - text

  # Core capabilities
  tool_calls: true
  tools: true
  tool_choice: true
  web_search: false
  attachments: false

  # Reasoning & Verbosity
  reasoning: false
  reasoning_effort: false
  reasoning_tokens: false
  include_reasoning: false
  verbosity: false

  # Generation control support flags
  temperature: true
  top_p: true
  top_k: true
  top_a: false
  min_p: false
  typical_p: false
  tfs: false
  max_tokens: false
  max_output_tokens: false
  stop: false
  stop_token_ids: false
  frequency_penalty: false
  presence_penalty: false
  repetition_penalty: false
  no_repeat_ngram_size: false
  length_penalty: false
  logit_bias: false
  bad_words: false
  allowed_tokens: false
  seed: false
  logprobs: false
  top_logprobs: false
  echo: false
  "n": false
  best_of: false
  mirostat: false
  mirostat_tau: false
  mirostat_eta: false
  contrastive_search_penalty_alpha: false
  num_beams: false
  early_stopping: false
  diversity_penalty: false

  # Response delivery
  format_response: false
  structured_outputs: false
  streaming: false
generation:
  temperature:
    min: 0.0
    max: 2.0
    default: 1.0
  top_p:
    min: 0.0
    max: 0.0
    default: 0.95
  top_k:
    min: 0
    max: 0
    default: 64

# Model limits
limits:
  context_window: 16384
  input_tokens: 16384
  output_tokens: 32768
extensions:
  google-ai-studio:
    fields:
      supported_actions:
      - bidiGenerateContent
      supported_generation_methods:
      - bidiGenerateContent
      version: 3.5-live-translate-06-2026

# Timestamps
created_at: 2026-07-11T20:15:12.209378Z
updated_at: 2026-07-11T20:15:12.209378Z
