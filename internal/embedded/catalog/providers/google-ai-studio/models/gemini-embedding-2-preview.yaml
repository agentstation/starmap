# gemini-embedding-2-preview - Obtain a distributed representation of multimodal content.
id: gemini-embedding-2-preview
name: Gemini Embedding 2 Preview
authors:
- id: google
  name: Google
description: Obtain a distributed representation of multimodal content.

# Model features
features:
  modalities:
    input:
    - text
    output: []

  # Core capabilities
  tool_calls: false
  tools: false
  tool_choice: false
  web_search: false
  attachments: false

  # Reasoning & Verbosity
  reasoning: false
  reasoning_effort: false
  reasoning_tokens: false
  include_reasoning: false
  verbosity: false

  # Generation control support flags
  temperature: false
  top_p: false
  top_k: false
  top_a: false
  min_p: false
  typical_p: false
  tfs: false
  max_tokens: false
  max_output_tokens: false
  stop: false
  stop_token_ids: false
  frequency_penalty: false
  presence_penalty: false
  repetition_penalty: false
  no_repeat_ngram_size: false
  length_penalty: false
  logit_bias: false
  bad_words: false
  allowed_tokens: false
  seed: false
  logprobs: false
  top_logprobs: false
  echo: false
  "n": false
  best_of: false
  mirostat: false
  mirostat_tau: false
  mirostat_eta: false
  contrastive_search_penalty_alpha: false
  num_beams: false
  early_stopping: false
  diversity_penalty: false

  # Response delivery
  format_response: false
  structured_outputs: false
  streaming: false

# Model limits
limits:
  context_window: 8192
  input_tokens: 8192
  output_tokens: 1
extensions:
  google-ai-studio:
    fields:
      supported_actions:
      - embedContent
      - countTextTokens
      - countTokens
      - asyncBatchEmbedContent
      supported_generation_methods:
      - embedContent
      - countTextTokens
      - countTokens
      - asyncBatchEmbedContent
      version: "2"

