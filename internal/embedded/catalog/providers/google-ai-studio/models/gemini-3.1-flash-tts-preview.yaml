# gemini-3.1-flash-tts-preview - Gemini 3.1 Flash TTS Preview
id: gemini-3.1-flash-tts-preview
name: Gemini 3.1 Flash TTS Preview
authors:
- id: google
  name: Google
description: Gemini 3.1 Flash TTS Preview

# Model features
features:
  modalities:
    input:
    - text
    - image
    output:
    - text

  # Core capabilities
  tool_calls: true
  tools: true
  tool_choice: true
  web_search: false
  attachments: false

  # Reasoning & Verbosity
  reasoning: true
  reasoning_effort: false
  reasoning_tokens: false
  include_reasoning: false
  verbosity: false

  # Generation control support flags
  temperature: true
  top_p: true
  top_k: true
  top_a: false
  min_p: false
  typical_p: false
  tfs: false
  max_tokens: true
  max_output_tokens: false
  stop: false
  stop_token_ids: false
  frequency_penalty: false
  presence_penalty: false
  repetition_penalty: false
  no_repeat_ngram_size: false
  length_penalty: false
  logit_bias: false
  bad_words: false
  allowed_tokens: false
  seed: false
  logprobs: false
  top_logprobs: false
  echo: false
  "n": false
  best_of: false
  mirostat: false
  mirostat_tau: false
  mirostat_eta: false
  contrastive_search_penalty_alpha: false
  num_beams: false
  early_stopping: false
  diversity_penalty: false

  # Response delivery
  format_response: false
  structured_outputs: false
  streaming: false
generation:
  temperature:
    min: 0.0
    max: 2.0
    default: 1.0
  top_p:
    min: 0.0
    max: 0.0
    default: 0.95
  top_k:
    min: 0
    max: 0
    default: 64

# Model limits
limits:
  context_window: 8192
  input_tokens: 8192
  output_tokens: 16384
extensions:
  google-ai-studio:
    fields:
      supported_actions:
      - generateContent
      - countTokens
      - batchGenerateContent
      supported_generation_methods:
      - generateContent
      - countTokens
      - batchGenerateContent
      thinking: true
      version: 3.1-flash-tts-preview

# Timestamps
created_at: 2026-07-11T20:15:12.209034Z
updated_at: 2026-07-11T20:15:12.209034Z
