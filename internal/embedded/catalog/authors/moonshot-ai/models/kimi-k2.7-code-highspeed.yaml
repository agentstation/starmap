# kimi-k2.7-code-highspeed - Coding-focused Kimi model, stronger on long-horizon repo wor...
id: kimi-k2.7-code-highspeed
name: kimi-k2.7-code-highspeed
authors:
- id: moonshot-ai
  name: moonshot-ai
description: Coding-focused Kimi model, stronger on long-horizon repo work with less overthinking

# Model metadata
metadata:
  release_date: 2026-06-12
  open_weights: true
  knowledge_cutoff: 2025-01-01
lineage:
  family: kimi-k2

# Model features
features:
  modalities:
    input:
    - text
    - image
    - video
    output:
    - text

  # Core capabilities
  tool_calls: false
  tools: false
  tool_choice: false
  web_search: false
  attachments: false

  # Reasoning & Verbosity
  reasoning: true
  reasoning_effort: false
  reasoning_tokens: false
  include_reasoning: false
  verbosity: false

  # Generation control support flags
  temperature: true
  top_p: true
  top_k: false
  top_a: false
  min_p: false
  typical_p: false
  tfs: false
  max_tokens: true
  max_output_tokens: false
  stop: true
  stop_token_ids: false
  frequency_penalty: false
  presence_penalty: false
  repetition_penalty: false
  no_repeat_ngram_size: false
  length_penalty: false
  logit_bias: false
  bad_words: false
  allowed_tokens: false
  seed: false
  logprobs: false
  top_logprobs: false
  echo: false
  "n": false
  best_of: false
  mirostat: false
  mirostat_tau: false
  mirostat_eta: false
  contrastive_search_penalty_alpha: false
  num_beams: false
  early_stopping: false
  diversity_penalty: false

  # Response delivery
  format_response: false
  structured_outputs: false
  streaming: true

# Model pricing
pricing:
  tokens:
    cache_read:
      per_1m: 0.38
    input:
      per_1m: 1.9
    output:
      per_1m: 8.0
  currency: USD

# Model limits
limits:
  context_window: 262144
  input_tokens: 0
  output_tokens: 262144
extensions:
  models.dev:
    fields:
      interleaved:
        enabled: true
        field: reasoning_content
  moonshot-ai:
    fields:
      permission:
      - group: moonshot
        organization: moonshot

