pricing:
  tokens:
    cache_read:
      per_1m: 0.1
    cache_write:
      per_1m: 1.25
    input:
      per_1m: 1.0
    output:
      per_1m: 6.0
  tiers:
  - type: context
    size: 272000
    tokens:
