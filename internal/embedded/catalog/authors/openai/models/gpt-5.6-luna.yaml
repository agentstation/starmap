# gpt-5.6-luna - Cost-efficient GPT-5.6 model for fast, high-volume workloads
id: gpt-5.6-luna
name: gpt-5.6-luna
authors:
- id: openai
  name: openai
description: Cost-efficient GPT-5.6 model for fast, high-volume workloads

# Model metadata
metadata:
  release_date: 2026-07-09
  open_weights: false
  knowledge_cutoff: 2026-02-16
lineage:
  family: gpt-nano

# Model features
features:
  modalities:
    input:
    - text
    - image
    - pdf
    output:
    - text

  # Core capabilities
  tool_calls: false
  tools: false
  tool_choice: false
  web_search: false
  attachments: false

  # Reasoning & Verbosity
  reasoning: false
  reasoning_effort: false
  reasoning_tokens: false
  include_reasoning: false
  verbosity: false

  # Generation control support flags
  temperature: true
  top_p: true
  top_k: false
  top_a: false
  min_p: false
  typical_p: false
  tfs: false
  max_tokens: true
  max_output_tokens: false
  stop: true
  stop_token_ids: false
  frequency_penalty: false
  presence_penalty: false
  repetition_penalty: false
  no_repeat_ngram_size: false
  length_penalty: false
  logit_bias: false
  bad_words: false
  allowed_tokens: false
  seed: false
  logprobs: false
  top_logprobs: false
  echo: false
  "n": false
  best_of: false
  mirostat: false
  mirostat_tau: false
  mirostat_eta: false
  contrastive_search_penalty_alpha: false
  num_beams: false
  early_stopping: false
  diversity_penalty: false

  # Response delivery
  format_response: false
  structured_outputs: false
  streaming: true
reasoning:
  levels:
  - low
  - medium
  - high
  - maximum
  default: null
modes:
  fast:
    pricing:
      tokens:
        cache_read:
          per_1m: 0.2
        cache_write:
          per_1m: 2.5
        input:
          per_1m: 2.0
        output:
          per_1m: 12.0
      currency: USD
    provider:
      body:
        service_tier: priority
  pro:
    provider:
      body:
        reasoning:
          mode: pro

