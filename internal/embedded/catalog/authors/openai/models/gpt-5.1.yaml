# gpt-5.1 - Sharper GPT-5 generation for coding, product work, and tool-...
id: gpt-5.1
name: gpt-5.1
authors:
- id: openai
  name: openai
description: Sharper GPT-5 generation for coding, product work, and tool-assisted tasks

# Model metadata
metadata:
  release_date: 2025-11-13
  open_weights: false
  knowledge_cutoff: 2024-09-30
lineage:
  family: gpt

# Model features
features:
  modalities:
    input:
    - text
    - image
    output:
    - text

  # Core capabilities
  tool_calls: false
  tools: false
  tool_choice: false
  web_search: false
  attachments: false

  # Reasoning & Verbosity
  reasoning: false
  reasoning_effort: false
  reasoning_tokens: false
  include_reasoning: false
  verbosity: false

  # Generation control support flags
  temperature: true
  top_p: true
  top_k: false
  top_a: false
  min_p: false
  typical_p: false
  tfs: false
  max_tokens: true
  max_output_tokens: false
  stop: true
  stop_token_ids: false
  frequency_penalty: false
  presence_penalty: false
  repetition_penalty: false
  no_repeat_ngram_size: false
  length_penalty: false
  logit_bias: false
  bad_words: false
  allowed_tokens: false
  seed: false
  logprobs: false
  top_logprobs: false
  echo: false
  "n": false
  best_of: false
  mirostat: false
  mirostat_tau: false
  mirostat_eta: false
  contrastive_search_penalty_alpha: false
  num_beams: false
  early_stopping: false
  diversity_penalty: false

  # Response delivery
  format_response: false
  structured_outputs: false
  streaming: true
reasoning:
  levels:
  - low
  - medium
  - high
  default: null

# Model pricing
pricing:
  tokens:
    cache_read:
      per_1m: 0.125
    input:
      per_1m: 1.25
    output:
      per_1m: 10.00
  currency: USD

# Model limits
limits:
  context_window: 400000
  input_tokens: 272000
  output_tokens: 128000
extensions:
  models.dev:
    fields:
      reasoning_options:
      - type: effort
        values:
        - none

